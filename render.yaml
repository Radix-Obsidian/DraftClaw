services:
  - type: web
    name: draftclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: DRAFTCLAW_STATE_DIR
        value: /data/.draftclaw
      - key: DRAFTCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: DRAFTCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: draftclaw-data
      mountPath: /data
      sizeGB: 1
