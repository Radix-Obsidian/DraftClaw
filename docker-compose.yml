services:
  draftclaw-gateway:
    image: ${DRAFTCLAW_IMAGE:-draftclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      DRAFTCLAW_GATEWAY_TOKEN: ${DRAFTCLAW_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${DRAFTCLAW_CONFIG_DIR}:/home/node/.draftclaw
      - ${DRAFTCLAW_WORKSPACE_DIR}:/home/node/.draftclaw/workspace
    ports:
      - "${DRAFTCLAW_GATEWAY_PORT:-18789}:18789"
      - "${DRAFTCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${DRAFTCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  draftclaw-cli:
    image: ${DRAFTCLAW_IMAGE:-draftclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      DRAFTCLAW_GATEWAY_TOKEN: ${DRAFTCLAW_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${DRAFTCLAW_CONFIG_DIR}:/home/node/.draftclaw
      - ${DRAFTCLAW_WORKSPACE_DIR}:/home/node/.draftclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
