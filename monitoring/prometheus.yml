global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'draftclaw'
    static_configs:
      - targets: ['localhost:3000']
    metrics_path: '/metrics'

  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'sports_data_api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:4000']
    scrape_interval: 30s

  - job_name: 'market_analysis'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:4001']
    scrape_interval: 1m
