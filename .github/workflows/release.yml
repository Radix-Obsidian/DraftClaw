name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install

      - name: Build
        run: pnpm build

      - name: Generate changelog
        id: changelog
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            
            const lastRelease = releases[0]?.tag_name;
            const currentTag = context.ref.replace('refs/tags/', '');
            
            const { data: commits } = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: lastRelease || '',
              head: currentTag
            });
            
            const categories = {
              'Features': [],
              'Bug Fixes': [],
              'Performance': [],
              'Documentation': [],
              'Other': []
            };
            
            for (const commit of commits.commits) {
              const message = commit.commit.message.split('\n')[0];
              if (message.startsWith('feat:')) {
                categories['Features'].push(message);
              } else if (message.startsWith('fix:')) {
                categories['Bug Fixes'].push(message);
              } else if (message.startsWith('perf:')) {
                categories['Performance'].push(message);
              } else if (message.startsWith('docs:')) {
                categories['Documentation'].push(message);
              } else {
                categories['Other'].push(message);
              }
            }
            
            let changelog = `# ${currentTag}\n\n`;
            
            for (const [category, messages] of Object.entries(categories)) {
              if (messages.length > 0) {
                changelog += `\n## ${category}\n\n`;
                for (const message of messages) {
                  changelog += `- ${message}\n`;
                }
              }
            }
            
            core.setOutput('changelog', changelog);

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: "!contains(github.ref, '-alpha.') && !contains(github.ref, '-beta.') && !contains(github.ref, '-rc.')"
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "New Release Published"
          description: |
            Version: ${{ github.ref_name }}
            Check it out at: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          color: 0x00ff00
          username: DraftClaw Release Bot
